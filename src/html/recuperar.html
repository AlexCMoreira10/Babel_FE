<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha</title>

  <!-- IONIC -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <ion-app>
    <ion-content fullscreen class="cadastro-page">

      <div class="box-cadastro">

        <h1>Recuperar Senha</h1>

        <div class="card-form">
          <h2>Nova senha</h2>

          <ion-item lines="none">
            <ion-label position="stacked">Email</ion-label>
            <ion-input type="email" placeholder="Digite seu email"></ion-input>
          </ion-item>

          <ion-item lines="none">
            <ion-label position="stacked">Nova senha</ion-label>
            <ion-input type="password" placeholder="Digite a nova senha"></ion-input>
          </ion-item>

          <ion-button expand="block" class="btn">
            Atualizar senha
          </ion-button>

          <p class="link-login">
            Lembrou a senha?
            <a href="../../index.html">Voltar para login</a>
          </p>

        </div>
      </div>

    </ion-content>
  </ion-app>
</body>
</html>
